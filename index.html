<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>NexPlay - IPTV Extractor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0fdf4;color:#0f172a;min-height:100vh}
header{background:#fff;border-bottom:2px solid #dcfce7;padding:0 18px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(22,163,74,.08)}
.logo{display:flex;align-items:center;gap:9px}
.logo-box{width:36px;height:36px;background:linear-gradient(135deg,#22c55e,#15803d);border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-box svg{width:20px;height:20px;fill:white}
.logo-name{font-size:19px;font-weight:800;color:#15803d;letter-spacing:-.5px}
.hbadge{background:#dcfce7;color:#15803d;font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;display:none}
.wrap{max-width:700px;margin:0 auto;padding:24px 16px 80px}
.card{background:#fff;border-radius:16px;border:1.5px solid #dcfce7;padding:22px;box-shadow:0 4px 20px rgba(22,163,74,.09);margin-bottom:20px}
.card h2{font-size:16px;font-weight:700;margin-bottom:14px}
.api-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px 14px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:12px;color:#92400e}
.api-row a{color:#15803d;font-weight:700;text-decoration:none}
.url-input,.api-input{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:13px 15px;font-size:15px;font-family:'Inter',sans-serif;color:#0f172a;outline:none;background:#f8fafc;transition:border-color .2s;margin-bottom:10px}
.api-input{font-size:13px;letter-spacing:.5px}
.url-input:focus,.api-input:focus{border-color:#22c55e;background:#fff}
.url-input::placeholder,.api-input::placeholder{color:#94a3b8}
.btn-fetch{width:100%;background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(22,163,74,.28);transition:opacity .18s}
.btn-fetch:hover{opacity:.9}
.btn-fetch:disabled{opacity:.6;cursor:not-allowed}
.paste-toggle{margin-top:13px;font-size:13px;color:#16a34a;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;user-select:none}
.paste-area{margin-top:10px;display:none}
.paste-area textarea{width:100%;min-height:120px;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px;font-size:12px;font-family:monospace;color:#0f172a;outline:none;resize:vertical;background:#f8fafc}
.btn-parse{margin-top:9px;background:#16a34a;color:#fff;border:none;border-radius:9px;padding:11px 22px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer}
.status{display:none;align-items:center;gap:10px;padding:13px 16px;border-radius:12px;margin-bottom:16px;font-size:14px;font-weight:500;line-height:1.5}
.status.loading{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.status.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.status.ok{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.spin{width:16px;height:16px;border:2px solid #93c5fd;border-top-color:#1d4ed8;border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.results{display:none}
.ch-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.ch-title-row{display:flex;align-items:center;gap:10px}
.ch-title{font-size:22px;font-weight:800}
.ch-badge{background:#22c55e;color:#fff;font-size:13px;font-weight:800;padding:4px 13px;border-radius:99px}
.ch-actions{display:flex;gap:8px}
.btn-sm{padding:9px 16px;border-radius:9px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;border:none}
.btn-dl{background:#fff;color:#15803d;border:1.5px solid #bbf7d0}
.btn-ca{background:#15803d;color:#fff}
.group-tabs{display:flex;overflow-x:auto;margin-bottom:16px;background:#fff;border-radius:12px;border:1.5px solid #dcfce7;padding:5px;scrollbar-width:none;gap:4px}
.group-tabs::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:8px 14px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.gtab.active{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;box-shadow:0 2px 10px rgba(22,163,74,.25)}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:#94a3b8}
.search-input{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px 11px 38px;font-size:14px;font-family:'Inter',sans-serif;color:#0f172a;outline:none;background:#fff;transition:border-color .2s}
.search-input:focus{border-color:#22c55e}
.channel-list{display:flex;flex-direction:column;gap:10px}
.ch-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:13px;overflow:hidden;transition:border-color .18s,box-shadow .18s}
.ch-card:hover{border-color:#86efac;box-shadow:0 3px 16px rgba(22,163,74,.11)}
.ch-main{display:flex;align-items:center;padding:14px 16px;gap:12px}
.ch-logo{width:42px;height:42px;border-radius:9px;object-fit:contain;background:#f0fdf4;border:1px solid #dcfce7;padding:4px;flex-shrink:0}
.ch-logo-ph{width:42px;height:42px;border-radius:9px;background:linear-gradient(135deg,#22c55e,#15803d);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-grp{font-size:12px;font-weight:700;color:#16a34a;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.ch-btns{display:flex;gap:8px}
.ico-btn{width:38px;height:38px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:background .15s}
.ico-expand{background:#f0fdf4;color:#16a34a}
.ico-expand:hover{background:#dcfce7}
.ico-cp{background:#f0fdf4;border:1.5px solid #bbf7d0}
.ico-cp:hover{background:#dcfce7}
.ico-cp svg{width:18px;height:18px;fill:#16a34a}
.ch-url-row{display:none;padding:0 16px 14px;gap:8px;align-items:center}
.ch-url-text{flex:1;font-size:11px;color:#64748b;font-family:monospace;background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:8px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-open{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}
.empty{text-align:center;padding:50px 20px;color:#64748b}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:700;color:#334155;margin-bottom:6px}
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);background:#0f172a;color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:500px){.ch-title{font-size:18px}.wrap{padding:16px 12px 80px}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-box"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <span class="logo-name">NexPlay</span>
  </div>
  <div class="hbadge" id="hbadge"></div>
</header>

<div class="wrap">
  <div class="card">
    <h2>📡 M3U Playlist URL</h2>

    <!-- Gemini API Key -->
    <div class="api-row">
      🔑 Gemini API Key দিন — <a href="https://aistudio.google.com/apikey" target="_blank">এখান থেকে ফ্রিতে নিন</a>
    </div>
    <input class="api-input" id="apiKey" type="password" placeholder="AIza... (Gemini API Key)"/>

    <input class="url-input" id="urlInput" type="url" placeholder="https://go.skym3u.top/u79y.m3u"/>
    <button class="btn-fetch" id="fetchBtn" onclick="loadPlaylist()">Fetch</button>

    <div class="paste-toggle" onclick="togglePaste()">📋 অথবা M3U text paste করুন ▾</div>
    <div class="paste-area" id="pasteArea">
      <textarea id="pasteInput" placeholder="#EXTM3U&#10;#EXTINF:-1 group-title=&quot;News&quot;,Channel Name&#10;http://stream-url..."></textarea>
      <button class="btn-parse" onclick="parseText()">▶ Parse</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="results" id="results">
    <div class="ch-header">
      <div class="ch-title-row">
        <div class="ch-title">Channels</div>
        <div class="ch-badge" id="totalCount">0</div>
      </div>
      <div class="ch-actions">
        <button class="btn-sm btn-dl" onclick="downloadM3U()">⬇ Download .m3u</button>
        <button class="btn-sm btn-ca" onclick="copyAll()">Copy All</button>
      </div>
    </div>
    <div class="group-tabs" id="groupTabs"></div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input class="search-input" id="searchInput" placeholder="Search by title or group..." oninput="renderList()"/>
    </div>
    <div class="channel-list" id="channelList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
let allChannels = [];
let activeGroup = 'ALL';

// ── Gemini API দিয়ে URL fetch ──
async function fetchViaGemini(targetUrl) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) throw new Error('Gemini API Key দিন! উপরের লিংক থেকে ফ্রিতে নিন।');

  const prompt = `Fetch the content of this URL and return ONLY the raw text content, nothing else, no explanation:
${targetUrl}

If you cannot fetch it, return exactly: FETCH_FAILED`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0, maxOutputTokens: 65536 }
      })
    }
  );

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('Gemini API Error: ' + (err?.error?.message || res.status));
  }

  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';

  if (!text || text.trim() === 'FETCH_FAILED') {
    throw new Error('Gemini URL fetch করতে পারেনি। text paste করে try করুন।');
  }
  if (!text.includes('#EXTINF') && !text.includes('#EXTM3U')) {
    throw new Error('Valid M3U content পাওয়া যায়নি। URL সঠিক কিনা চেক করুন।');
  }
  return text;
}

// ── M3U Parser ──
function parseM3U(text) {
  const lines = text.split(/\r?\n/);
  const result = [];
  let meta = null;
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line || line.startsWith('#EXTM3U')) continue;
    if (line.startsWith('#EXTINF')) { meta = line; continue; }
    if (line.length > 4 && !line.startsWith('#') && !line.startsWith('<')) {
      const m = meta || '#EXTINF:-1,Unnamed';
      let title = 'Unnamed';
      const mc = m.replace(/^#EXTINF:[-\d.]*\s*/, '').trim();
      const tvg = mc.match(/tvg-name="([^"]+)"/);
      if (tvg?.[1]?.trim()) {
        title = tvg[1].trim();
      } else {
        const ci = mc.lastIndexOf(',');
        title = ci !== -1 ? mc.substring(ci+1).trim() || 'Unnamed' : mc || 'Unnamed';
      }
      const grp  = m.match(/group-title="([^"]+)"/);
      const logo = m.match(/tvg-logo="([^"]+)"/);
      result.push({
        id: Math.random().toString(36).slice(2,9),
        title,
        group: grp ? grp[1].trim() : 'Uncategorized',
        logo: logo ? logo[1] : '',
        url: line,
        raw: `${m}\n${line}`
      });
      meta = null;
    }
  }
  return result;
}

// ── Load ──
async function loadPlaylist() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { toast('⚠ URL দিন!'); return; }
  setStatus('loading', '⏳ Gemini দিয়ে fetch হচ্ছে...');
  document.getElementById('results').style.display = 'none';
  document.getElementById('fetchBtn').disabled = true;
  allChannels = [];
  try {
    const text = await fetchViaGemini(url);
    allChannels = parseM3U(text);
    if (!allChannels.length) throw new Error('কোনো channel পাওয়া যায়নি।');
    onLoaded();
  } catch(e) {
    setStatus('error', '❌ ' + e.message);
  } finally {
    document.getElementById('fetchBtn').disabled = false;
  }
}

function parseText() {
  const text = document.getElementById('pasteInput').value.trim();
  if (!text) { toast('⚠ Text paste করুন!'); return; }
  allChannels = parseM3U(text);
  if (!allChannels.length) { setStatus('error', '❌ Valid M3U content পাওয়া যায়নি।'); return; }
  onLoaded();
}

function onLoaded() {
  setStatus('ok', `✅ ${allChannels.length} টি channel লোড হয়েছে!`);
  document.getElementById('results').style.display = 'block';
  document.getElementById('totalCount').textContent = allChannels.length;
  const b = document.getElementById('hbadge');
  b.textContent = allChannels.length + ' channels';
  b.style.display = 'block';
  activeGroup = 'ALL';
  renderGroupTabs();
  renderList();
}

function renderGroupTabs() {
  const groups = {};
  allChannels.forEach(c => { groups[c.group] = (groups[c.group]||0)+1; });
  const keys = Object.keys(groups).sort();
  document.getElementById('groupTabs').innerHTML =
    `<button class="gtab active" onclick="setGroup('ALL',this)">All ${allChannels.length}</button>` +
    keys.map(g => `<button class="gtab" onclick="setGroup('${esc(g)}',this)">${esc(g)} ${groups[g]}</button>`).join('');
}

function setGroup(g, el) {
  activeGroup = g;
  document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  renderList();
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allChannels;
  if (activeGroup !== 'ALL') filtered = filtered.filter(c => c.group === activeGroup);
  if (q) filtered = filtered.filter(c =>
    c.title.toLowerCase().includes(q) || c.group.toLowerCase().includes(q)
  );

  const list = document.getElementById('channelList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-ico">🔍</div><h3>কিছু পাওয়া যায়নি</h3></div>`;
    return;
  }

  list.innerHTML = filtered.slice(0, 500).map(c => {
    const logoHTML = c.logo
      ? `<img class="ch-logo" src="${esc(c.logo)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt=""/>
         <div class="ch-logo-ph" style="display:none">${esc(c.title[0]||'?')}</div>`
      : `<div class="ch-logo-ph">${esc(c.title[0]||'?')}</div>`;
    return `<div class="ch-card">
      <div class="ch-main">
        ${logoHTML}
        <div class="ch-info">
          <div class="ch-name">${esc(c.title)}</div>
          <div class="ch-grp">${esc(c.group)}</div>
        </div>
        <div class="ch-btns">
          <button class="ico-btn ico-expand" onclick="toggleExpand('${c.id}')">▾</button>
          <button class="ico-btn ico-cp" onclick="copyURL('${esc(c.url)}')">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          </button>
        </div>
      </div>
      <div class="ch-url-row" id="url_${c.id}">
        <div class="ch-url-text">${esc(c.url)}</div>
        <button class="btn-open" onclick="window.open('${esc(c.url)}','_blank')">▶ Open</button>
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(id) {
  const row = document.getElementById('url_' + id);
  const open = row.style.display === 'flex';
  row.style.display = open ? 'none' : 'flex';
  // update arrow
  row.previousElementSibling.querySelector('.ico-expand').textContent = open ? '▾' : '▴';
}

function copyURL(url)  { navigator.clipboard.writeText(url).then(() => toast('✅ URL copied!')); }
function copyAll() {
  const m3u = '#EXTM3U\n' + allChannels.map(c => c.raw).join('\n');
  navigator.clipboard.writeText(m3u).then(() => toast('✅ All copied!'));
}
function downloadM3U() {
  const m3u = '#EXTM3U\n' + allChannels.map(c => c.raw).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([m3u], {type:'application/x-mpegurl'}));
  a.download = 'playlist.m3u'; a.click();
  toast('⬇ Download শুরু!');
}
function setStatus(type, msg) {
  const s = document.getElementById('status');
  s.className = 'status ' + type; s.style.display = 'flex';
  s.innerHTML = type === 'loading'
    ? `<div class="spin"></div><span>${msg}</span>`
    : `<span>${msg}</span>`;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function togglePaste() {
  const el = document.getElementById('pasteArea');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
document.addEventListener('DOMContentLoaded', () => {
  // Save API key in localStorage
  const saved = localStorage.getItem('gemini_key');
  if (saved) document.getElementById('apiKey').value = saved;
  document.getElementById('apiKey').addEventListener('change', e => {
    localStorage.setItem('gemini_key', e.target.value);
  });
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadPlaylist();
  });
});
</script>
</body>
</html>
